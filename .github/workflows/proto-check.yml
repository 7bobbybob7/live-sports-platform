name: proto-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install codegen deps
        run: pip install "grpcio-tools>=1.64" "mypy-protobuf>=3.6"
      - name: Regenerate
        run: make proto
      - name: Fail if diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated proto files are out of date. Run 'make proto' locally and commit the result."
            exit 1
          fi
